<!DOCTYPE html>
<html>
<head>

    <title>Edit Task</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

</head>

<body class="bg-light">

<div class="container py-5">

    <div class="card shadow p-4 mx-auto" style="max-width: 600px;">

        <h1 class="text-center text-primary mb-4">
            Edit Task
        </h1>

        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Task Title
                </label>

                <input
                    type="text"
                    name="title"
                    value="{{ task.title }}"
                    class="form-control"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Description
                </label>

                <textarea
                    name="description"
                    class="form-control"
                    rows="4"
                >{{ task.description }}</textarea>

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Priority
                </label>

                <select
                    name="priority"
                    class="form-select"
                >

                    <option
                        value="High"
                        {% if task.priority == "High" %}selected{% endif %}
                    >
                        High
                    </option>

                    <option
                        value="Medium"
                        {% if task.priority == "Medium" %}selected{% endif %}
                    >
                        Medium
                    </option>

                    <option
                        value="Low"
                        {% if task.priority == "Low" %}selected{% endif %}
                    >
                        Low
                    </option>

                </select>

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Status
                </label>

                <select
                    name="status"
                    class="form-select"
                >

                    <option
                        value="Pending"
                        {% if task.status == "Pending" %}selected{% endif %}
                    >
                        Pending
                    </option>

                    <option
                        value="Completed"
                        {% if task.status == "Completed" %}selected{% endif %}
                    >
                        Completed
                    </option>

                </select>

            </div>

            <div class="d-flex justify-content-between">

                <a
                    href="/dashboard"
                    class="btn btn-secondary"
                >
                    Back
                </a>

                <button
                    type="submit"
                    class="btn btn-primary"
                >
                    Update Task
                </button>

            </div>

        </form>

    </div>

</div>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>Edit Task</title>
</head>
<body>

    <h1>Edit Task</h1>

    <form method="POST">

        <input 
            type="text" 
            name="title" 
            value="{{ task.title }}" 
            required
        >

        <br><br>

        <textarea name="description">{{ task.description }}</textarea>

        <br><br>

        <input 
            type="text" 
            name="priority" 
            value="{{ task.priority }}"
        >

        <br><br>

        <input 
            type="text" 
            name="status" 
            value="{{ task.status }}"
        >

        <br><br>

        <button type="submit">Update Task</button>

    </form>

</body>
</html>
